<!DOCTYPE html>
<html>
<head>
    <title>Google OAuth - Morning Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 500px;
        }
        .success {
            color: #10b981;
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .error {
            color: #ff6b6b;
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        button {
            background: #4285f4;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="processing">
            <h1>🔄 Processing OAuth...</h1>
            <p>Please wait while we complete authentication...</p>
        </div>
        
        <div id="success" style="display: none;">
            <div class="success">✅</div>
            <h1>Authentication Successful!</h1>
            <p>Your Google Tasks access has been restored.</p>
            <button onclick="window.location.href='index.html'">Return to Dashboard</button>
        </div>
        
        <div id="error" style="display: none;">
            <div class="error">❌</div>
            <h1>Authentication Failed</h1>
            <p id="errorMsg"></p>
            <button onclick="startAuth()">Try Again</button>
        </div>
    </div>

    <script>
        const CLIENT_ID = '310221293117-eiv0ouknutm3mjchgio5ceopf9hvbnr8.apps.googleusercontent.com';
        const CLIENT_SECRET = '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';
        
        // Handle OAuth redirect
        async function handleRedirect() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const error = urlParams.get('error');
            
            if (error) {
                showError('Authorization denied: ' + error);
                return;
            }
            
            if (!code) {
                // No code in URL, start OAuth flow
                startAuth();
                return;
            }
            
            // Exchange code for tokens
            try {
                const response = await fetch('https://oauth2.googleapis.com/token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({
                        code: code,
                        client_id: CLIENT_ID,
                        client_secret: CLIENT_SECRET,
                        redirect_uri: window.location.origin + window.location.pathname,
                        grant_type: 'authorization_code'
                    })
                });
                
                const data = await response.json();
                
                if (data.access_token) {
                    // Store tokens
                    sessionStorage.setItem('google_access_token', data.access_token);
                    const expiryTime = Date.now() + ((data.expires_in - 60) * 1000);
                    sessionStorage.setItem('google_token_expiry', expiryTime.toString());
                    
                    if (data.refresh_token) {
                        localStorage.setItem('google_refresh_token', data.refresh_token);
                        localStorage.setItem('google_token_updated', new Date().toISOString());
                    }
                    
                    showSuccess();
                } else {
                    showError('Failed to get access token: ' + (data.error || 'Unknown error'));
                }
            } catch (err) {
                showError('Network error: ' + err.message);
            }
        }
        
        function startAuth() {
            const SCOPES = [
                'https://www.googleapis.com/auth/tasks.readonly',
                'https://www.googleapis.com/auth/calendar.readonly'
            ];
            
            const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
                `client_id=${CLIENT_ID}&` +
                `redirect_uri=${encodeURIComponent(window.location.origin + window.location.pathname)}&` +
                `response_type=code&` +
                `scope=${encodeURIComponent(SCOPES.join(' '))}&` +
                `access_type=offline&` +
                `prompt=consent`;
            
            window.location.href = authUrl;
        }
        
        function showSuccess() {
            document.getElementById('processing').style.display = 'none';
            document.getElementById('success').style.display = 'block';
        }
        
        function showError(msg) {
            document.getElementById('processing').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('errorMsg').textContent = msg;
        }
        
        // Start handling redirect on load
        handleRedirect();
    </script>
</body>
</html>
